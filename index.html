<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>God World Sim</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: sans-serif;
      background: #111;
      color: #eee;
    }

    #toolbar {
      width: 160px;
      background: #222;
      border-right: 2px solid #333;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-group-title {
      font-size: 14px;
      margin-top: 10px;
      margin-bottom: 4px;
      color: #aaa;
    }

    .tool-btn {
      width: 100%;
      padding: 6px;
      border: 1px solid #444;
      background: #333;
      color: #eee;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
    }

    .tool-btn.selected {
      border-color: #fff;
      background: #555;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #world {
      display: block;
      background: #000;
    }

    #info {
      position: absolute;
      left: 10px;
      bottom: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 4px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="tool-group-title">Terrain</div>
    <button class="tool-btn" data-tool="grass">Grass</button>
    <button class="tool-btn" data-tool="sand">Sand</button>
    <button class="tool-btn" data-tool="water">Water</button>
    <button class="tool-btn" data-tool="mountain">Mountain</button>

    <div class="tool-group-title">Creatures</div>
    <button class="tool-btn" data-tool="human">Human</button>
    <button class="tool-btn" data-tool="animal">Animal</button>

    <div class="tool-group-title">Disasters (stub)</div>
    <button class="tool-btn" data-tool="meteor">Meteor</button>
    <button class="tool-btn" data-tool="fire">Fire</button>
  </div>

  <div id="canvas-container">
    <canvas id="world"></canvas>
    <div id="info">WASD to move • Scroll to zoom • Click to place</div>
  </div>

  <script>
    const canvas = document.getElementById("world");
    const ctx = canvas.getContext("2d");
    const container = document.getElementById("canvas-container");

    function resizeCanvas() {
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const TILE_SIZE = 20;
    const WORLD_W = 200;
    const WORLD_H = 200;

    let cameraX = 0;
    let cameraY = 0;
    let zoom = 1.0;

    let currentTool = "grass";

    const world = [];
    for (let y = 0; y < WORLD_H; y++) {
      const row = [];
      for (let x = 0; x < WORLD_W; x++) {
        row.push({
          terrain: "water",
          creatures: []
        });
      }
      world.push(row);
    }

    const terrainColors = {
      water: "#0050ff",
      grass: "#228b22",
      sand: "#c2b280",
      mountain: "#777777"
    };

    const creatureColors = {
      human: "#ffdf80",
      animal: "#ff8080"
    };

    function worldToScreen(x, y) {
      const size = TILE_SIZE * zoom;
      return {
        sx: x * size - cameraX,
        sy: y * size - cameraY,
        size
      };
    }

    function screenToWorld(mx, my) {
      const size = TILE_SIZE * zoom;
      const wx = Math.floor((mx + cameraX) / size);
      const wy = Math.floor((my + cameraY) / size);
      return { wx, wy };
    }

    function drawWorld() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const size = TILE_SIZE * zoom;

      const startX = Math.max(0, Math.floor(cameraX / size) - 2);
      const startY = Math.max(0, Math.floor(cameraY / size) - 2);
      const endX = Math.min(
        WORLD_W,
        Math.ceil((cameraX + canvas.width) / size) + 2
      );
      const endY = Math.min(
        WORLD_H,
        Math.ceil((cameraY + canvas.height) / size) + 2
      );

      for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
          const tile = world[y][x];
          const { sx, sy } = worldToScreen(x, y);

          ctx.fillStyle = terrainColors[tile.terrain] || "#000";
          ctx.fillRect(sx, sy, size, size);

          if (tile.creatures.length > 0) {
            const c = tile.creatures[0];
            ctx.fillStyle = creatureColors[c.type] || "#fff";
            const r = size * 0.3;
            ctx.beginPath();
            ctx.arc(sx + size / 2, sy + size / 2, r, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }

    const toolbarButtons = document.querySelectorAll(".tool-btn");
    toolbarButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        toolbarButtons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        currentTool = btn.dataset.tool;
      });
    });
    toolbarButtons[0].classList.add("selected");

    canvas.addEventListener("mousedown", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const { wx, wy } = screenToWorld(mx, my);
      if (wx < 0 || wy < 0 || wx >= WORLD_W || wy >= WORLD_H) return;

      const tile = world[wy][wx];

      if (["grass", "sand", "water", "mountain"].includes(currentTool)) {
        tile.terrain = currentTool;
      } else if (["human", "animal"].includes(currentTool)) {
        tile.creatures.push({ type: currentTool });
      } else if (currentTool === "meteor") {
        tile.terrain = "mountain";
        tile.creatures = [];
      } else if (currentTool === "fire") {
        tile.terrain = "sand";
        tile.creatures = [];
      }

      drawWorld();
    });

    canvas.addEventListener("wheel", (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const before = screenToWorld(mx, my);

      const delta = -e.deltaY;
      const factor = delta > 0 ? 1.1 : 0.9;
      zoom = Math.max(0.2, Math.min(5, zoom * factor));

      const after = screenToWorld(mx, my);

      const size = TILE_SIZE * zoom;
      cameraX += (after.wx - before.wx) * size;
      cameraY += (after.wy - before.wy) * size;

      drawWorld();
    }, { passive: false });

    const keys = {};
    window.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;
    });
    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function updateCamera() {
      const speed = 10;
      if (keys["a"]) cameraX -= speed;
      if (keys["d"]) cameraX += speed;
      if (keys["w"]) cameraY -= speed;
      if (keys["s"]) cameraY += speed;
    }

    function loop() {
      updateCamera();
      drawWorld();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
