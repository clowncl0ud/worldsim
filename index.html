<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel God Sim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toolbar">
    <h2>Tools</h2>

    <div class="section">Terrain</div>
    <button class="tool" data-tool="grass">Grass</button>
    <button class="tool" data-tool="sand">Sand</button>
    <button class="tool" data-tool="water">Water</button>
    <button class="tool" data-tool="mountain">Mountain</button>

    <div class="section">Creatures</div>
    <button class="tool" data-tool="human">Human</button>
    <button class="tool" data-tool="animal">Animal</button>

    <div class="section">Disasters</div>
    <button class="tool" data-tool="meteor">Meteor</button>
    <button class="tool" data-tool="fire">Fire</button>
    <button class="tool" data-tool="tornado">Tornado</button>
    <button class="tool" data-tool="flood">Flood</button>
    <button class="tool" data-tool="plague">Plague</button>

    <div class="section">Brush Size</div>
    <input type="range" id="brush" min="1" max="10" value="1">
  </div>

  <canvas id="world"></canvas>

  <script src="script.js"></script>
</body>
</html>
